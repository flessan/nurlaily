<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Space Grotesk"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        /* ===== BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #050510;
            color: #e2e8f0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ===== AMBIENT ORBS ===== */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.13) 0%, transparent 70%);
            top: -200px;
            left: -100px;
            animation: drift1 25s ease-in-out infinite;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(192, 132, 252, 0.10) 0%, transparent 70%);
            bottom: -150px;
            right: -80px;
            animation: drift2 30s ease-in-out infinite;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.07) 0%, transparent 70%);
            top: 45%;
            left: 45%;
            animation: drift3 22s ease-in-out infinite;
        }

        @keyframes drift1 {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(90px, 70px) scale(1.05);
            }

            66% {
                transform: translate(-50px, 110px) scale(0.95);
            }
        }

        @keyframes drift2 {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(-70px, -90px) scale(1.08);
            }

            66% {
                transform: translate(60px, -50px) scale(0.96);
            }
        }

        @keyframes drift3 {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.35);
            }
        }

        /* ===== GLASSMORPHISM ===== */
        .glass {
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .glass-strong {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 320px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .sidebar-head {
            padding: 28px 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .logo-text {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #22d3ee 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-sub {
            font-size: 0.7rem;
            color: #334155;
            margin-top: 2px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.04em;
        }

        .sidebar-divider {
            height: 1px;
            margin-top: 16px;
            background: linear-gradient(to right, rgba(34, 211, 238, 0.25), rgba(192, 132, 252, 0.25), transparent);
        }

        .sidebar-meta {
            font-size: 0.7rem;
            color: #1e293b;
            font-family: 'JetBrains Mono', monospace;
            margin-top: 12px;
        }

        /* Entry list */
        .entry-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        .entry-list::-webkit-scrollbar {
            width: 3px;
        }

        .entry-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .entry-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }

        .entry-item {
            padding: 13px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            margin-bottom: 3px;
        }

        .entry-item:hover {
            background: rgba(255, 255, 255, 0.035);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .entry-item.active {
            background: rgba(34, 211, 238, 0.05);
            border-color: rgba(34, 211, 238, 0.14);
        }

        .entry-item.active .entry-date-text {
            color: #22d3ee;
        }

        .entry-date-text {
            font-size: 0.78rem;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 3px;
            transition: color 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .entry-preview-text {
            font-size: 0.72rem;
            color: #334155;
            line-height: 1.45;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-left: 320px;
            height: 100vh;
            overflow-y: auto;
            padding: 48px 64px 80px;
            position: relative;
            z-index: 1;
        }

        .main-content::-webkit-scrollbar {
            width: 5px;
        }

        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
        }

        /* Journal sections */
        .journal-section {
            margin-bottom: 56px;
            opacity: 0;
            animation: rise 0.5s ease forwards;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .journal-badge {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #22d3ee;
            padding: 5px 14px;
            background: rgba(34, 211, 238, 0.07);
            border: 1px solid rgba(34, 211, 238, 0.12);
            border-radius: 6px;
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 18px;
        }

        .journal-body {
            padding: 32px 36px;
            border-radius: 16px;
            line-height: 1;
        }

        /* ===== MARKDOWN TYPOGRAPHY ===== */
        .journal-body h1 {
            font-size: 1.85rem;
            font-weight: 700;
            color: #f1f5f9;
            margin: 0 0 14px;
            line-height: 1.3;
        }

        .journal-body h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #f1f5f9;
            margin: 28px 0 12px;
            line-height: 1.35;
        }

        .journal-body h3 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #e2e8f0;
            margin: 22px 0 10px;
            line-height: 1.4;
        }

        .journal-body h4 {
            font-size: 1.05rem;
            font-weight: 600;
            color: #e2e8f0;
            margin: 18px 0 8px;
            line-height: 1.4;
        }

        .journal-body p {
            font-size: 0.95rem;
            line-height: 1.85;
            color: #94a3b8;
            margin-bottom: 18px;
        }

        .journal-body ul {
            list-style: none;
            padding-left: 0;
            margin-bottom: 18px;
        }

        .journal-body ul li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 7px;
            color: #94a3b8;
            line-height: 1.75;
            font-size: 0.95rem;
        }

        .journal-body ul li::before {
            content: '\203A';
            position: absolute;
            left: 2px;
            color: #22d3ee;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .journal-body ol {
            padding-left: 24px;
            margin-bottom: 18px;
        }

        .journal-body ol li {
            margin-bottom: 7px;
            color: #94a3b8;
            line-height: 1.75;
            font-size: 0.95rem;
        }

        .journal-body ol li::marker {
            color: #c084fc;
            font-weight: 600;
        }

        .journal-body code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 9px;
            border-radius: 5px;
            color: #c084fc;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .journal-body pre {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px 24px;
            overflow-x: auto;
            margin-bottom: 18px;
        }

        .journal-body pre code {
            background: none;
            padding: 0;
            color: #cbd5e1;
            border: none;
            font-size: 0.82rem;
            line-height: 1.7;
        }

        .journal-body blockquote {
            border-left: 3px solid #c084fc;
            padding: 14px 22px;
            margin: 18px 0;
            background: rgba(192, 132, 252, 0.03);
            border-radius: 0 10px 10px 0;
        }

        .journal-body blockquote p {
            color: #64748b;
            font-style: italic;
            margin-bottom: 0;
        }

        .journal-body hr {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.08), transparent);
            margin: 36px 0;
        }

        .journal-body a {
            color: #22d3ee;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.15s;
        }

        .journal-body a:hover {
            color: #67e8f9;
        }

        .journal-body strong {
            color: #f1f5f9;
            font-weight: 600;
        }

        .journal-body em {
            color: #c084fc;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 140px 40px;
        }

        .empty-state h2 {
            font-size: 1.35rem;
            color: #334155;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .empty-state p {
            color: #1e293b;
            font-size: 0.85rem;
        }

        .empty-state code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255, 255, 255, 0.04);
            padding: 3px 10px;
            border-radius: 5px;
            color: #475569;
            font-size: 0.8rem;
        }

        /* ===== FOOTER ===== */
        .site-footer {
            text-align: center;
            padding: 48px 0 24px;
            color: #0f172a;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.06em;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 860px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .entry-list {
                max-height: 220px;
            }

            .main-content {
                margin-left: 0;
                padding: 28px 20px 60px;
                height: auto;
            }

            body {
                overflow: auto;
            }

            .journal-body {
                padding: 20px;
            }
        }

        /* ===== REDUCED MOTION ===== */
        @media (prefers-reduced-motion: reduce) {
            .orb {
                animation: none !important;
            }

            .journal-section {
                animation: none !important;
                opacity: 1 !important;
            }

            *,
            *::before,
            *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>

    <!-- Latar belakang ambient -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <!-- Sidebar navigasi -->
    <aside class="sidebar glass-strong" role="navigation" aria-label="Daftar catatan harian">
        <div class="sidebar-head">
            <div class="logo-text">NurLaily</div>
            <div class="sidebar-sub">daily draft</div>
            <div class="sidebar-divider"></div>
            <div class="sidebar-meta">{{.Count}} catatan tersimpan</div>
        </div>
        <div class="entry-list" id="entryList">
            {{range .Entries}}
            <div class="entry-item" data-slug="{{.Slug}}" tabindex="0" role="button"
                aria-label="Lihat catatan {{.Date}}" onclick="scrollTo('{{.Slug}}')"
                onkeydown="if(event.key==='Enter')scrollTo('{{.Slug}}')">
                <div class="entry-date-text">{{.Date}}</div>
                <div class="entry-preview-text">{{.Preview}}</div>
            </div>
            {{end}}
        </div>
    </aside>

    <!-- Konten utama -->
    <main class="main-content" role="main">
        {{if eq .Count 0}}
        <div class="empty-state">
            <h2>Belum ada catatan</h2>
            <p>Mulai menulis dengan <code>laily draft "halo dunia"</code></p>
        </div>
        {{else}}
        {{range $i, $e := .Entries}}
        <section class="journal-section" id="entry-{{$e.Slug}}" style="animation-delay: {{delay $i}};">
            <div class="journal-badge">{{$e.Date}}</div>
            <div class="journal-body glass">
                {{$e.Content}}
            </div>
        </section>
        {{end}}
        {{end}}

        <footer class="site-footer">built with laily</footer>
    </main>

    <script>
        /* Navigasi sidebar → scroll ke section */
        function scrollTo(slug) {
            var el = document.getElementById('entry-' + slug);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            setActive(slug);
        }

        function setActive(slug) {
            document.querySelectorAll('.entry-item').forEach(function (item) {
                item.classList.toggle('active', item.getAttribute('data-slug') === slug);
            });
        }

        /* IntersectionObserver: highlight sidebar saat scroll */
        var sections = document.querySelectorAll('.journal-section');
        if (sections.length > 0 && 'IntersectionObserver' in window) {
            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        var slug = entry.target.id.replace('entry-', '');
                        setActive(slug);
                    }
                });
            }, {
                threshold: 0.15,
                rootMargin: '-5% 0px -75% 0px'
            });
            sections.forEach(function (s) { observer.observe(s); });
        }

        /* Set item pertama aktif saat halaman dimuat */
        var first = document.querySelector('.entry-item');
        if (first) first.classList.add('active');
    </script>
</body>

</html>
